<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Fabric grain map</title>
  <desc id="desc">Diagram showing warp, weft, selvage and true bias directions on woven fabric.</desc>
  <rect width="980" height="420" fill="#fffaf2"/>
  <rect x="80" y="55" width="620" height="310" rx="8" fill="#ffffff" stroke="#18212f" stroke-width="4"/>
  <rect x="80" y="55" width="34" height="310" fill="#00a6d6"/>
  <rect x="666" y="55" width="34" height="310" fill="#00a6d6"/>
  <g stroke="#ffd23f" stroke-width="5">
    <line x1="150" y1="60" x2="150" y2="360"/>
    <line x1="210" y1="60" x2="210" y2="360"/>
    <line x1="270" y1="60" x2="270" y2="360"/>
    <line x1="330" y1="60" x2="330" y2="360"/>
    <line x1="390" y1="60" x2="390" y2="360"/>
    <line x1="450" y1="60" x2="450" y2="360"/>
    <line x1="510" y1="60" x2="510" y2="360"/>
    <line x1="570" y1="60" x2="570" y2="360"/>
    <line x1="630" y1="60" x2="630" y2="360"/>
  </g>
  <g stroke="#4fd6a7" stroke-width="5">
    <line x1="84" y1="105" x2="696" y2="105"/>
    <line x1="84" y1="155" x2="696" y2="155"/>
    <line x1="84" y1="205" x2="696" y2="205"/>
    <line x1="84" y1="255" x2="696" y2="255"/>
    <line x1="84" y1="305" x2="696" y2="305"/>
  </g>
  <line x1="160" y1="335" x2="620" y2="90" stroke="#ff6b4a" stroke-width="8" stroke-linecap="round"/>
  <text x="385" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#18212f">Woven fabric directions</text>
  <text x="118" y="388" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#006a7d">Selvage</text>
  <text x="602" y="388" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#006a7d">Selvage</text>
  <text x="720" y="145" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#18212f">Warp</text>
  <text x="720" y="174" font-family="Arial, sans-serif" font-size="18" fill="#18212f">lengthwise, stable</text>
  <text x="720" y="235" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#18212f">Weft</text>
  <text x="720" y="264" font-family="Arial, sans-serif" font-size="18" fill="#18212f">crosswise, slight stretch</text>
  <text x="720" y="324" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#18212f">True bias</text>
  <text x="720" y="353" font-family="Arial, sans-serif" font-size="18" fill="#18212f">45 degrees, best drape</text>
</svg>
